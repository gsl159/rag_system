x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ───────────── 基础设施（全部 host 网络） ─────────────

  etcd:
    image: quay.io/coreos/etcd:v3.5.11
    logging: *default-logging
    command: >
      etcd
      --advertise-client-urls=http://localhost:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    logging: *default-logging
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 5 &&
        mc alias set local http://localhost:9000 minioadmin minioadmin123 &&
        mc mb local/milvus-bucket --ignore-existing
      "
    restart: "no"

  milvus:
    image: milvusdb/milvus:v2.3.9
    logging: *default-logging
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: localhost:2379
      MINIO_ADDRESS: localhost:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin123
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: milvus-bucket
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio-init
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    logging: *default-logging
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    logging: *default-logging
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  # ───────────── 应用层 ─────────────

  backend:
    build:
      context: ./backend
    logging: *default-logging
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://raguser:ragpass123@postgres:5432/ragdb
      REDIS_URL: redis://redis:6379/0
      MILVUS_HOST: milvus
      MINIO_ENDPOINT: minio:9000
      APP_ENV: production
    depends_on:
      - postgres
      - redis
      - milvus
    volumes:
      - backend_logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    logging: *default-logging
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
  postgres_data:
  backend_logs:

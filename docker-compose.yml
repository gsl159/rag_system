x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ───────────── 基础设施 ─────────────

  etcd:
    image: quay.io/coreos/etcd:v3.5.11
    logging: *default-logging
    environment:
      ETCD_AUTO_COMPACTION_MODE:      revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES:       "4294967296"
      ETCD_SNAPSHOT_COUNT:            "50000"
    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    logging: *default-logging
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      # 用 mc 命令直接探活，比 HTTP 端点可靠得多
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # 创建 Milvus 所需的 bucket，完成后自动退出
  minio-init:
    image: minio/mc:latest
    logging: *default-logging
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb local/milvus-bucket --ignore-existing &&
        echo 'bucket ready'
      "
    restart: "no"

  milvus:
    image: milvusdb/milvus:v2.3.9
    logging: *default-logging
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS:          etcd:2379
      MINIO_ADDRESS:           minio:9000
      MINIO_ACCESS_KEY_ID:     minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin123
      MINIO_USE_SSL:           "false"
      MINIO_BUCKET_NAME:       milvus-bucket
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9091/healthz || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    logging: *default-logging
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    logging: *default-logging
    environment:
      POSTGRES_DB:       ragdb
      POSTGRES_USER:     raguser
      POSTGRES_PASSWORD: ragpass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ───────────── 应用层 ─────────────

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    logging: *default-logging
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL:   postgresql+asyncpg://raguser:ragpass123@postgres:5432/ragdb
      REDIS_URL:      redis://redis:6379/0
      MILVUS_HOST:    milvus
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    logging: *default-logging
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
  postgres_data:
  backend_logs:
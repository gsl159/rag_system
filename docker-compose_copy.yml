x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── 基础设施 ───────────────────────────────

  etcd:
    image: quay.io/coreos/etcd:v3.5.11
    logging: *default-logging
    environment:
      ETCD_AUTO_COMPACTION_MODE:      revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES:       "4294967296"
      ETCD_SNAPSHOT_COUNT:            "50000"
    command: >
      etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    logging: *default-logging
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    command: minio server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.3.9
    logging: *default-logging
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS:  minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 15s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    logging: *default-logging
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    logging: *default-logging
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ragdb}
      POSTGRES_USER:     ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 应用层 ─────────────────────────────────

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    logging: *default-logging
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL:   postgresql+asyncpg://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD:-ragpass123}@postgres:5432/${POSTGRES_DB:-ragdb}
      REDIS_URL:      redis://redis:6379/0
      MILVUS_HOST:    milvus
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    logging: *default-logging
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
  postgres_data:
  backend_logs:
